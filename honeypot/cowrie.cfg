[honeypot]
hostname = server
log_path = /cowrie/var/log/cowrie
download_path = /cowrie/var/lib/cowrie/downloads
contents_path = /honeypot
txtcmds_path = /honeypot/txtcmds
data_path = /honeypot/data
state_path = /cowrie/var/lib/cowrie

[output_jsonlog]
enabled = true
logfile = /cowrie/var/log/cowrie/cowrie.json

[ssh]
enabled = true
rsa_public_key = /cowrie/etc/ssh_host_rsa_key.pub
rsa_private_key = /cowrie/etc/ssh_host_rsa_key
version = SSH-2.0_OpenSSH_7.4
